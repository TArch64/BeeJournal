name: Release APK

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GOOGLE_APPLICATION_CREDENTIALS: app/google-application-credentials.json
      RELEASE_APK: app/build/outputs/apk/release/app-release.apk

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Extract version from tag
      id: version
      run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

    - name: Create keystore properties
      env:
        KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
      run: printenv KEYSTORE_PROPERTIES > keystore.properties

    - name: Create google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: printenv GOOGLE_SERVICES_JSON > app/google-services.json

    - name: Set version
      run: |
        cat > app/version.properties <<EOF
        versionCode=${{ github.run_number }}
        versionName=${{ steps.version.outputs.name }}
        EOF

    - name: Build Release APK
      run: ./gradlew :app:assembleRelease

    - name: Upload APK to Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "${{ github.event.release.tag_name }}" "$RELEASE_APK#BeeJournal-${{ steps.version.outputs.name }}.apk"

    - name: Install Firebase CLI
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        printenv FIREBASE_SERVICE_ACCOUNT > $GOOGLE_APPLICATION_CREDENTIALS
        curl -sL https://firebase.tools | bash

    - name: Publish to Firebase
      env:
        RELEASE_NOTES: ${{ github.event.release.body }}
      run: |
        printenv RELEASE_NOTES > $RUNNER_TEMP/release-notes.txt
        firebase appdistribution:distribute $RELEASE_APK --app ${{ secrets.FIREBASE_APP_ID }} --release-notes-file $RUNNER_TEMP/release-notes.txt
