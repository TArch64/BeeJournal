name: Release APK

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Create keystore properties
        run: echo "${{ secrets.KEYSTORE_PROPERTIES }}" > keystore.properties

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      - name: Set version
        run: |
          cat > app/version.properties <<EOF
          versionCode=${{ github.run_number }}
          versionName=${{ steps.version.outputs.name }}
          EOF

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "app/build/outputs/apk/release/app-release.apk#BeeJournal-${{ steps.version.outputs.name }}.apk"